name: MeetSync CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, group-service, calendar-service, ideas-service, voting-service, gateway]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy ruff pytest pytest-asyncio

      - name: Lint with ruff
        working-directory: ./${{ matrix.service }}
        run: ruff check app/ || true

      - name: Type check with mypy
        working-directory: ./${{ matrix.service }}
        run: mypy app/ --ignore-missing-imports || true

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all services
        run: docker compose build
